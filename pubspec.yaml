#--------------------Packages End-----------------#
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3

  flutter_lints: ^5.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logos/jar_logo.png"
  adaptive_icon_background: "#ffffff"
