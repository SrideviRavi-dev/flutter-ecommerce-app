name: myapp
description: "A new Flutter project."

publish_to: 'none' 


version: 2.0.0+2

environment:
  sdk: ^3.5.2

#------------------PACKAGES------------------#  


dependencies:
  flutter:
    sdk: flutter


  # Utility Packages
  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.1
  iconsax: ^0.0.8
  carousel_slider: ^5.0.0
  intl: ^0.20.2
  readmore: ^3.0.0
  flutter_rating_bar: ^4.0.1
  url_launcher: ^6.3.0
